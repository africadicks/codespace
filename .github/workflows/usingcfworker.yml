name: cf worker usage

on:
  workflow_dispatch:

jobs:
  stress_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp tqdm

      - name: Run 200 concurrent requests
        run: |
          python - <<'EOF'
          import asyncio
          import aiohttp
          from tqdm import tqdm
          
          URL = "https://projectech.kendall-r.workers.dev/"
          
          CONCURRENCY = 400
          TARGET_SUCCESS = 100000
          TIMEOUT = 10
          
          headers = {
              "User-Agent": "Mozilla/5.0",
              "Accept": "*/*",
              "Connection": "keep-alive"
          }
          
          success_count = 0
          lock = asyncio.Lock()
          
          async def worker(session, pbar):
              global success_count
          
              while True:
                  async with lock:
                      if success_count >= TARGET_SUCCESS:
                          return
          
                  try:
                      async with session.get(URL, headers=headers, timeout=TIMEOUT) as resp:
                          text = await resp.text()
          
                          async with lock:
                              if success_count < TARGET_SUCCESS:
                                  success_count += 1
                                  pbar.update(1)
                                  print(f"[{success_count}] Status: {resp.status}, Length: {len(text)}")
          
                  except asyncio.TimeoutError:
                      # 超时不计数
                      pass
                  except Exception as e:
                      # 其他错误也不计数
                      print("ERR:", repr(e))
          
          
          async def main():
              timeout = aiohttp.ClientTimeout(total=TIMEOUT)
          
              async with aiohttp.ClientSession(timeout=timeout) as session:
                  pbar = tqdm(total=TARGET_SUCCESS)
          
                  tasks = [
                      asyncio.create_task(worker(session, pbar))
                      for _ in range(CONCURRENCY)
                  ]
          
                  await asyncio.gather(*tasks)
          
                  pbar.close()
          
          
          asyncio.run(main())
          EOF
